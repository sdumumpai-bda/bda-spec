# ─────────────────────────────────────────────────────────────────────────────
# bda-spec — SHARED project configuration (git-tracked, commit this file)
# ─────────────────────────────────────────────────────────────────────────────
# Scope: project-wide settings ที่เหมือนกันทุกคนในทีม
#   - project metadata (name, language, timezone)
#   - vault_path, mode, standard version
#   - subagents baseline + project guardrails
#
# Personal / per-machine settings → `.bda-spec.local.yml` (gitignored)
#   - external_vault, daily_log_mirror, evidence_staging, secrets_file
#   - user.name/email, ai_usage cost rates, evidence_upload (rclone)
#   - subagents_override (เช่น disable figma เฉพาะเครื่องที่ไม่มี license)
#
# Override precedence (resolved by scripts/bda-paths.sh):
#   .bda-spec.local.yml  >  .bda-spec.yml  >  hardcoded defaults
#
# Generated by /bda-init — modify carefully
# ─────────────────────────────────────────────────────────────────────────────

# Project metadata
project:
  name: "Library Book Tracker"          # change to your project name
  slug: "library-book-tracker"          # used in filenames
  language: "th"                        # primary language for reports (th|en)
  timezone: "Asia/Bangkok"

# Mode: standalone | submodule
# - standalone: bda-spec is the project root
# - submodule: bda-spec is included as a git submodule in a larger repo;
#   vault_path may point outside this folder (e.g., "../shared-vault")
mode: standalone

# Obsidian vault location (relative to bda-spec root)
# Default: docs/obsidian-vault — แยกจาก docs/ เพื่อให้ docs/ เก็บเอกสารอื่นๆได้ด้วย
# (README, ARCHITECTURE.md, public API docs, etc.)
vault_path: docs/obsidian-vault

# bda-spec own version (v0.4+: was at root VERSION → .bda-spec/VERSION → now here)
# Bumped automatically by scripts/upgrade.sh
bda_spec:
  version: "0.4.0"

# BDA Standard version pinned for this project
# Bump via /bda-sync — never edit manually unless syncing
# IMPORTANT (v0.4+): source is bda-spec (curated layer), NOT upstream BDA standard.
# Flow: upstream BDA standard → bda-spec curates+tests → user project syncs from bda-spec.
# This guarantees standard version is always compatible with bda-spec commands.
standard:
  source: "https://github.com/sdumumpai-bda/bda-spec"   # curated layer (was: BigDataAgency/bda-ai-dev-standard)
  version: "0.8.0"                                       # pinned BDA standard version (= .bda-spec/VERSION)
  snapshot_path: .bda-spec                               # v0.4+: was .bda-spec/standards/, flattened
  last_synced: "2026-05-21"
  bda_spec_version: "0.4.0"                              # which bda-spec release this snapshot came from

# Subagents enabled for this project
# /bda-init asks which ones; toggle on/off here
# Files live in .claude/agents/<name>.md
subagents:
  docs: true                            # vault keeper, always on
  verifier: true                        # test/lint/build runner, always on
  security: true                        # secret/PII scanner, always on
  backend: false                        # enable for API/server work
  frontend: false                       # enable for web UI work
  mobile: false                         # enable for mobile app work
  figma: false                          # enable when Figma is design source

# Submodules (used by /bda-git and /bda-implement)
# Leave empty for monorepo / single-codebase projects
submodules: []
# Example for thai-cleft-style multi-repo:
# submodules:
#   - name: api
#     path: ./api
#     branch: develop
#   - name: web
#     path: ./web
#     branch: develop
#   - name: app
#     path: ./app
#     branch: master

# Executive reporting (for /bda-checkin end-of-day section)
executive_report:
  recipients: []                        # list of executive recipients (display only)
  include_token_cost: true              # daily-log v5 AI Usage section
  include_progress_percent: true        # auto-calc from PHASE files

# Doc templates — paths checked in order; first match wins
# Override .bda-spec/standards/templates/* by placing same filename in templates/
# (root `templates/` ไม่ได้ติดมากับ installer ตั้งแต่ v0.4 — สร้างเองเมื่อจะ customize)
template_lookup:
  - templates                           # project-customized (highest priority, optional)
  - .bda-spec/standards/templates       # org-level snapshot (always present)

# Safety guardrails
guardrails:
  no_fake_evidence: true                # enforce — never invent commit hash, tokens, links
  visible_menu_default: true            # UI checks via visible menu unless labeled technical-only
  prod_write_blocked: true              # block writes to production envs
  pii_masking_required: true            # screenshots with PII must be masked
